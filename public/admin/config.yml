backend:
  name: git-gateway
  branch: main

media_folder: public
public_folder: /

collections:
  - name: "settings"
    label: "Website Content"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "content/hero.json"
        fields:
          - { label: "Main Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
